name: Stock Analysis 365

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'テスト実行（通知・記録なし）'
        required: false
        type: boolean
        default: false
      provider:
        description: 'LLMプロバイダー（空欄でconfig.jsonの設定を使用）'
        required: false
        type: choice
        options:
          - ''
          - openai
          - anthropic
          - google

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install OCR dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-jpn poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run stock analysis
        run: |
          ARGS=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run --verbose"
          fi
          if [ -n "$INPUT_PROVIDER" ]; then
            ARGS="$ARGS --provider $INPUT_PROVIDER"
          fi
          python main.py $ARGS
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_PROVIDER: ${{ github.event.inputs.provider }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
